<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Run — Code Bench Fun</title>
<link rel="stylesheet" href="assets/site.css?v=3">
<style>
  /* ---------- run.html page-specific styles ---------- */

  /* full-width layout: the grid is the show — use the screen */
  body:not(.reel) .wrap { max-width: 1720px; }
  @media (min-width: 1000px) {
    .run-head { flex-direction: row !important; align-items: center; gap: 18px !important; flex-wrap: wrap; margin-bottom: 16px !important; }
    .run-head .back { flex: none; }
    .run-head .title-row { flex: 1 1 auto; min-width: 0; }
    .run-head details.prompt { flex: 1 1 100%; order: 10; padding: 6px 14px; }
    .run-head .actions { margin-left: auto; }
    .stat-strip { margin-bottom: 16px; }
    .stat-tile { padding: 10px 8px 8px; }
    .stat-tile .hero-num { font-size: 22px; }
  }

  .run-head { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }
  .run-head .back { color: var(--t-dim); font-size: 13px; transition: color .2s var(--ease); }
  .run-head .back:hover { color: var(--t-hero); }
  .run-head .title-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .run-head .pills { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .run-head details.prompt { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 14px; }
  .run-head details.prompt summary { cursor: pointer; color: var(--t-mute); font-size: 12px; text-transform: uppercase; letter-spacing: .1em; }
  .run-head details.prompt pre { white-space: pre-wrap; word-break: break-word; font-family: var(--mono); font-size: 13px; color: var(--t-body); margin: 10px 0 2px; }
  .run-head .actions { display: flex; gap: 10px; }

  /* judge score reveal */
  .panel-sub .judge { color: var(--t-hero); opacity: 0; transition: opacity .4s var(--ease); }
  .panel-sub .judge.show { opacity: 1; }

  /* system prompt details at bottom */
  details.sysprompt { margin-top: 18px; }
  details.sysprompt summary { cursor: pointer; color: var(--t-mute); font-size: 12px; text-transform: uppercase; letter-spacing: .1em; }
  details.sysprompt pre { white-space: pre-wrap; word-break: break-word; font-family: var(--mono); font-size: 12px; color: var(--t-dim); margin-top: 10px; }

  /* stats table verdict column */
  table.stats td.verdict { text-align: left; font-family: var(--sans); color: var(--t-dim); font-size: 12px; max-width: 260px; white-space: normal; }
  table.stats td.fail-cell { text-align: left; color: var(--t-ghost); font-family: var(--sans); }

  /* clickable cost number = skip to end */
  .panel-head .cost { cursor: pointer; }

  /* empty state */
  .empty-card { text-align: center; padding: 60px 20px; }
  .empty-card .label { display: block; margin-bottom: 14px; }
  .empty-card a.btn { display: inline-block; margin-top: 18px; }

  /* reel mode: only first 4 panels visible, exit button, footer */
  body.reel .panel.reel-hide { display: none; }
  .reel-exit {
    display: none; position: fixed; top: 14px; right: 14px; z-index: 50;
    width: 34px; height: 34px; border-radius: 999px; background: rgba(23,23,23,.8);
    border: 1px solid var(--border-hi); color: var(--t-hero); font-size: 16px; line-height: 1;
    align-items: center; justify-content: center; opacity: .25; transition: opacity .2s var(--ease);
  }
  .reel-exit:hover { opacity: 1; }
  body.reel .reel-exit { display: flex; }

  @media (max-width: 720px) {
    .run-head .title-row { flex-direction: column; align-items: flex-start; gap: 6px; }
  }

  /* rerun modal */
  .rr-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(4px); z-index: 90; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .rr-modal { background: #171717; border: 1px solid var(--border-hi); border-radius: var(--r-lg); padding: 22px; width: min(680px, 100%); max-height: 88vh; overflow-y: auto; }
  .rr-modal h2 { margin: 0 0 4px; font-size: 18px; }
  .rr-keys { font-size: 11px; color: var(--t-ghost); font-family: var(--mono); margin-bottom: 14px; }
  .rr-keys b { color: var(--t-mute); font-weight: 600; }
  .rr-models { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin: 12px 0; }
  .rr-model { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--r-sm); background: rgba(23,23,23,.6); cursor: pointer; transition: border-color .15s var(--ease), background .15s var(--ease); }
  .rr-model.on { border-color: #525252; background: rgba(38,38,38,.7); }
  .rr-model .chip { font-size: 13px; } .rr-model .chip svg { width: 16px; height: 16px; }
  .rr-model .tick { margin-left: auto; color: var(--t-ghost); font-family: var(--mono); font-size: 12px; }
  .rr-model.on .tick { color: var(--t-hero); }
  .rr-mode { display: flex; gap: 8px; margin: 12px 0; }
  .rr-mode button { flex: 1; }
  .rr-mode button.sel { border-color: #525252; background: #333; }
  .rr-cmd { background: rgba(10,10,10,.9); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 12px 14px; font-family: var(--mono); font-size: 11.5px; line-height: 1.55; color: var(--t-body); white-space: pre-wrap; word-break: break-all; max-height: 160px; overflow-y: auto; }
  .rr-foot { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .rr-est { font-size: 12px; color: var(--t-dim); font-family: var(--mono); margin-left: auto; }
</style>
</head>
<body>

<button class="reel-exit" id="reelExit" title="Exit reel mode" aria-label="Exit reel mode">✕</button>

<div class="wrap" id="wrap">
  <div id="content"></div>
</div>

<script src="assets/site.js?v=3"></script>
<script>
(function () {
  "use strict";

  document.getElementById("content").insertAdjacentHTML("beforebegin", CBF.topbar(""));

  const params = new URLSearchParams(location.search);
  const runId = params.get("id");
  const content = document.getElementById("content");

  if (!runId) {
    renderEmpty("No run specified.");
    return;
  }

  CBF.loadRun(runId).then(renderRun).catch(function (err) {
    console.error(err);
    renderEmpty("Couldn't load that run.");
  });

  function renderEmpty(msg) {
    content.innerHTML =
      '<div class="card empty-card">' +
      '<span class="label">' + escapeHtml(msg) + '</span>' +
      '<div>Head back to the gallery to pick a run.</div>' +
      '<a class="btn" href="index.html">&larr; Gallery</a>' +
      "</div>";
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function fmtDateShort(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return "—";
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  }

  // race length for the slowest model, seconds; ?replay=N overrides
  let SCALE_MS = 8000;
  const replayParam = parseFloat(params.get("replay"));
  if (replayParam >= 5 && replayParam <= 120) SCALE_MS = replayParam * 1000;
  const alwaysLoop = params.get("loop") === "1";
  let handles = [];
  let loopTimer = null;
  let run = null;

  function renderRun(data) {
    run = data;
    const builds = Array.isArray(run.builds) ? run.builds : [];

    // ---- totals for stat strip ----
    const totalCost = builds.reduce(function (s, b) { return s + (b.cost_usd || 0); }, 0);
    const maxMs = builds.reduce(function (m, b) { return Math.max(m, b.ms || 0); }, 0);
    const totalOutTok = builds.reduce(function (s, b) { return s + (b.output_tokens || 0); }, 0);
    const modelCount = builds.length;
    let bestKey = run.best;
    if (!bestKey) {
      let bestScore = -1;
      builds.forEach(function (b) {
        const sc = b.judge && typeof b.judge.score === "number" ? b.judge.score : -1;
        if (b.ok && sc > bestScore) { bestScore = sc; bestKey = b.model_key; }
      });
    }

    // ---- header ----
    document.title = (run.title || "Run") + " — Code Bench Fun";

    const kind = run.kind === "interactive" ? "interactive" : "simulation";
    const judgeModelKey = run.judge && run.judge.model_key;
    const judgeName = judgeModelKey && CBF.MODELS[judgeModelKey] ? CBF.MODELS[judgeModelKey].name : "Opus 4.8";

    const headHtml =
      '<section class="run-head no-reel">' +
        '<a class="back" href="index.html">&larr; Gallery</a>' +
        '<div class="title-row">' +
          '<h1 class="page-title">' + escapeHtml(run.title || "Untitled run") + "</h1>" +
          '<div class="pills">' +
            '<span class="pill">' + kind + "</span>" +
            '<span class="pill">' + escapeHtml(fmtDateShort(run.created)) + "</span>" +
            '<span class="pill">judged by ' + escapeHtml(judgeName) + "</span>" +
          "</div>" +
        "</div>" +
        (run.prompt
          ? '<details class="prompt"><summary>Prompt</summary><pre class="mono">' + escapeHtml(run.prompt) + "</pre></details>"
          : "") +
        '<div class="actions">' +
          '<button class="btn" id="btnReplay">Replay</button>' +
          '<button class="btn ghost" id="btnReel">Reel mode</button>' +
          '<button class="btn ghost" id="btnRerun">Rerun&hellip;</button>' +
        "</div>" +
      "</section>";

    // ---- stat strip ----
    const bestChip = bestKey ? CBF.logoChip(bestKey, 18) : "—";
    const statHtml =
      '<section class="stat-strip no-reel">' +
        '<div class="card stat-tile"><span class="hero-num">' + CBF.fmtUSD(totalCost) + '</span><span class="label">Total cost</span></div>' +
        '<div class="card stat-tile"><span class="hero-num mono">' + CBF.fmtMs(maxMs) + '</span><span class="label">Wall time</span></div>' +
        '<div class="card stat-tile"><span class="hero-num mono">' + CBF.fmtTok(totalOutTok) + '</span><span class="label">Output tokens</span></div>' +
        '<div class="card stat-tile"><span class="hero-num">' + modelCount + '</span><span class="label">Models</span></div>' +
        '<div class="card stat-tile"><span class="hero-num" style="font-size:20px">' + bestChip + '</span><span class="label">Best</span></div>' +
      "</section>";

    // ---- grid ----
    const gridHtml = '<section class="rungrid">' + builds.map(buildPanel).join("") + "</section>";

    // ---- desktop stats table ----
    const tableHtml = buildStatsTable(builds);

    // ---- system prompt details ----
    const sysHtml = run.system_prompt
      ? '<details class="sysprompt no-reel"><summary>System prompt</summary><pre class="mono">' + escapeHtml(run.system_prompt) + "</pre></details>"
      : "";

    // ---- footer ----
    const footHtml =
      '<footer class="site no-reel">' +
        '<a href="privacy.html">Privacy</a>' +
        '<a href="https://github.com/GGCryptoh/code_bench_fun" target="_blank" rel="noopener">GitHub</a>' +
        '<span>AI-built games, judged by AI</span>' +
      "</footer>";

    content.innerHTML = headHtml + statHtml + gridHtml + tableHtml + sysHtml + footHtml;

    // ---- fit the whole grid on screen: pick cols + panel size so every model is visible ----
    function sizeGrid() {
      const grid = content.querySelector(".rungrid");
      if (!grid) return;
      const n = builds.length;
      if (document.body.classList.contains("reel") || window.innerWidth < 1000 || n === 0) {
        grid.style.gridTemplateColumns = "";
        grid.style.justifyContent = "";
        return;
      }
      const CHROME = 76;   // panel head + sub row height
      const GAP = 12;
      const availW = grid.clientWidth || content.clientWidth;
      const availH = window.innerHeight - 24; // grid can own the viewport once scrolled to
      let best = { cols: 2, side: 0 };
      for (let cols = 2; cols <= Math.min(4, n); cols++) {
        const rows = Math.ceil(n / cols);
        const sideW = (availW - (cols - 1) * GAP) / cols;
        const sideH = (availH - (rows - 1) * GAP) / rows - CHROME;
        const side = Math.min(sideW, sideH);
        if (side > best.side) best = { cols: cols, side: side };
      }
      const side = Math.max(240, Math.floor(best.side)); // floor so tiny screens still get usable panels
      grid.style.gridTemplateColumns = "repeat(" + best.cols + ", " + side + "px)";
      grid.style.justifyContent = "center";
    }
    sizeGrid();
    window.addEventListener("resize", sizeGrid);
    document.body.addEventListener("cbf-reel-change", sizeGrid);

    // start the games only once this page is fully loaded (or right away if it already is)
    function armFrames() {
      content.querySelectorAll("iframe[data-src]").forEach(function (f) {
        f.src = f.dataset.src;
        f.removeAttribute("data-src");
      });
    }
    if (document.readyState === "complete") setTimeout(armFrames, 0);
    else window.addEventListener("load", function () { setTimeout(armFrames, 0); });

    // ---- wire up interactions ----
    wireReplay(builds, maxMs);
    wireReel(builds, maxMs);
    wireSkip(builds);
    wireRerun();

    startCounters(builds, maxMs);

    if (params.get("reel") === "1") enterReel();
  }

  function buildPanel(build, i) {
    const ok = !!build.ok;
    const chip = CBF.logoChip(build.model_key, 20);
    // src assigned after page load — a game that never fires `load` must not hold the page hostage
    const frameInner = ok
      ? '<iframe sandbox="allow-scripts" loading="eager" data-src="' + escapeHtml(build.file) + '"></iframe>'
      : '<div class="fail">' + escapeHtml((CBF.MODELS[build.model_key] && CBF.MODELS[build.model_key].name) || build.model_key) +
        " failed: " + escapeHtml(build.error || "unknown error") + "</div>";

    const turns = build.turns != null ? build.turns + (build.turns === 1 ? " turn" : " turns") : "—";

    return (
      '<div class="panel reveal" style="animation-delay:' + (i * 60) + 'ms" data-idx="' + i + '">' +
        '<div class="panel-head">' +
          chip +
          '<span class="cost mono" data-role="cost">$0.00</span>' +
          '<span class="bar"></span>' +
        "</div>" +
        '<div class="panel-sub">' +
          '<span class="time" data-role="time">' + escapeHtml(CBF.fmtMs(build.ms)) + "</span>" +
          '<span class="tok" data-role="tok">0 tok</span>' +
          '<span class="tps" data-role="tps">— tok/s</span>' +
          '<span class="turns">' + escapeHtml(turns) + "</span>" +
          '<span class="judge" data-role="judge"></span>' +
        "</div>" +
        '<div class="frame">' + frameInner + "</div>" +
      "</div>"
    );
  }

  function buildStatsTable(builds) {
    if (!builds.length) return "";

    function maxIdx(pick) {
      let idx = -1, val = null;
      builds.forEach(function (b, i) {
        if (!b.ok) return;
        const v = pick(b);
        if (v == null || isNaN(v)) return;
        if (val === null || v > val) { val = v; idx = i; }
      });
      return idx;
    }
    function minIdx(pick) {
      let idx = -1, val = null;
      builds.forEach(function (b, i) {
        if (!b.ok) return;
        const v = pick(b);
        if (v == null || isNaN(v)) return;
        if (val === null || v < val) { val = v; idx = i; }
      });
      return idx;
    }

    const fastestIdx = minIdx(function (b) { return b.ms; });
    const highestTpsIdx = maxIdx(function (b) { return b.tps; });
    const cheapestIdx = minIdx(function (b) { return b.cost_usd; });
    const worksIdx = maxIdx(function (b) { return b.judge && b.judge.works; });
    const fidelityIdx = maxIdx(function (b) { return b.judge && b.judge.fidelity; });
    const polishIdx = maxIdx(function (b) { return b.judge && b.judge.polish; });
    const creativityIdx = maxIdx(function (b) { return b.judge && b.judge.creativity; });
    const scoreIdx = maxIdx(function (b) { return b.judge && b.judge.score; });

    const rows = builds.map(function (b, i) {
      const name = (CBF.MODELS[b.model_key] && CBF.MODELS[b.model_key].name) || b.model_key;
      if (!b.ok) {
        return (
          "<tr>" +
            "<td>" + CBF.logoChip(b.model_key, 16) + "</td>" +
            '<td class="fail-cell" colspan="12">' + escapeHtml(name) + " failed: " + escapeHtml(b.error || "unknown error") + "</td>" +
          "</tr>"
        );
      }
      const j = b.judge || {};
      const cls = function (idx) { return idx === i ? " best" : ""; };
      return (
        "<tr>" +
          "<td>" + CBF.logoChip(b.model_key, 16) + "</td>" +
          '<td class="' + cls(fastestIdx).trim() + '">' + escapeHtml(CBF.fmtMs(b.ms)) + "</td>" +
          "<td>" + escapeHtml(CBF.fmtTok(b.input_tokens)) + "</td>" +
          "<td>" + escapeHtml(CBF.fmtTok(b.output_tokens)) + "</td>" +
          '<td class="' + cls(highestTpsIdx).trim() + '">' + (b.tps != null ? b.tps.toFixed(1) : "—") + "</td>" +
          "<td>" + (b.turns != null ? b.turns : "—") + "</td>" +
          '<td class="' + cls(cheapestIdx).trim() + '">' + escapeHtml(CBF.fmtUSD(b.cost_usd)) + "</td>" +
          '<td class="' + cls(worksIdx).trim() + '">' + (j.works != null ? j.works : "—") + "</td>" +
          '<td class="' + cls(fidelityIdx).trim() + '">' + (j.fidelity != null ? j.fidelity : "—") + "</td>" +
          '<td class="' + cls(polishIdx).trim() + '">' + (j.polish != null ? j.polish : "—") + "</td>" +
          '<td class="' + cls(creativityIdx).trim() + '">' + (j.creativity != null ? j.creativity : "—") + "</td>" +
          '<td class="' + cls(scoreIdx).trim() + '">' + (j.score != null ? j.score.toFixed(1) : "—") + "</td>" +
          '<td class="verdict">' + escapeHtml(j.verdict || "—") + "</td>" +
        "</tr>"
      );
    }).join("");

    return (
      '<div class="card no-reel" style="margin-top:20px; overflow-x:auto">' +
        '<table class="stats"><thead><tr>' +
          "<th>Model</th><th>Time</th><th>In tok</th><th>Out tok</th><th>Tok/s</th><th>Turns</th>" +
          "<th>Cost</th><th>Works</th><th>Fidelity</th><th>Polish</th><th>Creativity</th><th>Score</th><th>Verdict</th>" +
        "</tr></thead><tbody>" + rows + "</tbody></table>" +
      "</div>"
    );
  }

  function elsFor(panel) {
    return {
      cost: panel.querySelector('[data-role="cost"]'),
      tok: panel.querySelector('[data-role="tok"]'),
      tps: panel.querySelector('[data-role="tps"]'),
      time: panel.querySelector('[data-role="time"]'),
      bar: panel.querySelector(".bar"),
    };
  }

  function startCounters(builds, maxMs) {
    cancelAll();
    const panels = content.querySelectorAll(".panel");
    let doneCount = 0;
    const total = builds.length;

    handles = builds.map(function (build, i) {
      const panel = panels[i];
      if (!panel) return null;
      const els = elsFor(panel);
      const judgeEl = panel.querySelector('[data-role="judge"]');
      if (judgeEl) { judgeEl.textContent = ""; judgeEl.classList.remove("show"); }

      return CBF.counter(els, build, maxMs, SCALE_MS, function onDone() {
        if (judgeEl && build.judge && typeof build.judge.score === "number") {
          judgeEl.textContent = "★ " + build.judge.score.toFixed(1);
          judgeEl.classList.add("show");
        }
        doneCount++;
        if (doneCount >= total && (alwaysLoop || document.body.classList.contains("reel"))) {
          scheduleReelLoop(builds, maxMs);
        }
      });
    });
  }

  function cancelAll() {
    handles.forEach(function (h) { if (h) h.cancel(); });
    handles = [];
    if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
  }

  function scheduleReelLoop(builds, maxMs) {
    if (loopTimer) clearTimeout(loopTimer);
    loopTimer = setTimeout(function () {
      if (alwaysLoop || document.body.classList.contains("reel")) startCounters(builds, maxMs);
    }, 4000);
  }

  function wireReplay(builds, maxMs) {
    const btn = document.getElementById("btnReplay");
    if (btn) btn.addEventListener("click", function () { startCounters(builds, maxMs); });
  }

  function wireSkip(builds) {
    content.addEventListener("click", function (e) {
      const cost = e.target.closest('[data-role="cost"]');
      if (!cost) return;
      handles.forEach(function (h) { if (h) h.finish(); });
    });
  }

  function enterReel() {
    document.body.classList.add("reel");
    // reel shows the first 4 SUCCESSFUL builds — failed ones don't waste a slot
    if (run && Array.isArray(run.builds)) {
      let shown = 0;
      content.querySelectorAll(".rungrid .panel").forEach(function (p, i) {
        const b = run.builds[i];
        const keep = b && b.ok && shown < 4;
        if (keep) shown++;
        p.classList.toggle("reel-hide", !keep);
      });
    }
    if (!document.querySelector(".reel-foot")) {
      const foot = document.createElement("div");
      foot.className = "reel-foot";
      foot.innerHTML = CBF.siteLogo(20) + "<span>Code Bench Fun &mdash; One Prompt, Every Model</span>";
      document.getElementById("wrap").appendChild(foot);
    }
    const btn = document.getElementById("btnReel");
    if (btn) btn.textContent = "Exit reel";
    document.body.dispatchEvent(new Event("cbf-reel-change"));
  }

  function exitReel() {
    document.body.classList.remove("reel");
    content.querySelectorAll(".panel.reel-hide").forEach(function (p) { p.classList.remove("reel-hide"); });
    if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
    const btn = document.getElementById("btnReel");
    if (btn) btn.textContent = "Reel mode";
    document.body.dispatchEvent(new Event("cbf-reel-change"));
  }

  function wireReel(builds, maxMs) {
    const btn = document.getElementById("btnReel");
    if (btn) btn.addEventListener("click", function () {
      if (document.body.classList.contains("reel")) {
        exitReel();
      } else {
        enterReel();
        startCounters(builds, maxMs); // fresh take for the recording
      }
    });
    const exitBtn = document.getElementById("reelExit");
    if (exitBtn) exitBtn.addEventListener("click", exitReel);
    document.addEventListener("keydown", function (e) {
      if (e.key !== "Escape") return;
      if (document.getElementById("rrOverlay")) closeRerun();
      else if (document.body.classList.contains("reel")) exitReel();
    });
  }

  /* ---------- rerun modal: rebuild this prompt with a different squad ----------
     shortcuts while open: f = flip selection · r = random squad · a = all · n = none · Esc = close */
  const rrSel = new Set();

  function shellQuote(s) {
    return "'" + String(s).replace(/'/g, "'\\''") + "'";
  }

  function rrCommand() {
    const keys = Object.keys(CBF.MODELS).filter(function (k) { return rrSel.has(k); });
    const mergeMode = document.getElementById("rrModeMerge").classList.contains("sel");
    if (mergeMode) {
      return "node runner/bench.mjs --id " + run.id + " --models " + keys.join(",") + " --merge";
    }
    const newId = run.id.replace(/-v\d+$/, "") + "-v2";
    return "node runner/bench.mjs --id " + newId +
      " --title " + shellQuote((run.title || run.id) + " v2") +
      " --kind " + (run.kind === "interactive" ? "interactive" : "simulation") +
      " --models " + keys.join(",") +
      " --prompt " + shellQuote(run.prompt || "");
  }

  function rrRefresh() {
    document.querySelectorAll(".rr-model").forEach(function (el) {
      const on = rrSel.has(el.dataset.key);
      el.classList.toggle("on", on);
      el.querySelector(".tick").textContent = on ? "[x]" : "[ ]";
    });
    const cmdEl = document.getElementById("rrCmd");
    if (cmdEl) cmdEl.textContent = rrSel.size ? rrCommand() : "# pick at least one model";
    let est = 0;
    rrSel.forEach(function (k) {
      const m = CBF.MODELS[k];
      est += (m.in_per_m * 600 + m.out_per_m * 8000) / 1e6;
    });
    const estEl = document.getElementById("rrEst");
    if (estEl) estEl.textContent = rrSel.size + " models · ≈ " + CBF.fmtUSD(est);
  }

  function rrShortcuts(e) {
    if (e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
    const all = Object.keys(CBF.MODELS);
    if (e.key === "f") { // flip: old squad out, everyone else in
      all.forEach(function (k) { rrSel.has(k) ? rrSel.delete(k) : rrSel.add(k); });
    } else if (e.key === "r") { // random squad, same size (min 2)
      const size = Math.max(2, rrSel.size || 4);
      rrSel.clear();
      all.slice().sort(function () { return Math.random() - 0.5; }).slice(0, size).forEach(function (k) { rrSel.add(k); });
    } else if (e.key === "a") { all.forEach(function (k) { rrSel.add(k); }); }
    else if (e.key === "n") { rrSel.clear(); }
    else return;
    e.preventDefault();
    rrRefresh();
  }

  function openRerun() {
    if (document.getElementById("rrOverlay") || !run) return;
    rrSel.clear();
    (run.builds || []).forEach(function (b) { if (CBF.MODELS[b.model_key]) rrSel.add(b.model_key); });

    const overlay = document.createElement("div");
    overlay.className = "rr-overlay";
    overlay.id = "rrOverlay";
    overlay.innerHTML =
      '<div class="rr-modal">' +
        "<h2>Rerun this game</h2>" +
        '<div class="rr-keys"><b>f</b> flip squad &nbsp;·&nbsp; <b>r</b> random &nbsp;·&nbsp; <b>a</b> all &nbsp;·&nbsp; <b>n</b> none &nbsp;·&nbsp; <b>esc</b> close</div>' +
        '<div class="rr-models">' +
        Object.keys(CBF.MODELS).map(function (k) {
          return '<div class="rr-model" data-key="' + k + '">' + CBF.logoChip(k, 16) + '<span class="tick">[ ]</span></div>';
        }).join("") +
        "</div>" +
        '<div class="rr-mode">' +
          '<button class="btn ghost sel" id="rrModeMerge" title="replace these models inside this run">Merge into this run</button>' +
          '<button class="btn ghost" id="rrModeNew" title="same prompt, brand new run">New run (' + escapeHtml(run.id) + '-v2)</button>' +
        "</div>" +
        '<div class="rr-cmd mono" id="rrCmd"></div>' +
        '<div class="rr-foot">' +
          '<button class="btn" id="rrCopy">Copy command</button>' +
          '<button class="btn ghost" id="rrClose">Close</button>' +
          '<span class="rr-est" id="rrEst"></span>' +
        "</div>" +
      "</div>";
    document.body.appendChild(overlay);

    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) return closeRerun();
      const card = e.target.closest(".rr-model");
      if (card) {
        rrSel.has(card.dataset.key) ? rrSel.delete(card.dataset.key) : rrSel.add(card.dataset.key);
        rrRefresh();
      }
    });
    document.getElementById("rrClose").addEventListener("click", closeRerun);
    document.getElementById("rrModeMerge").addEventListener("click", function () { rrMode(true); });
    document.getElementById("rrModeNew").addEventListener("click", function () { rrMode(false); });
    document.getElementById("rrCopy").addEventListener("click", function () {
      const cmd = rrSel.size ? rrCommand() : "";
      if (!cmd) return;
      const btn = document.getElementById("rrCopy");
      (navigator.clipboard ? navigator.clipboard.writeText(cmd) : Promise.reject()).then(function () {
        btn.textContent = "Copied — paste in your terminal";
      }).catch(function () {
        const ta = document.createElement("textarea");
        ta.value = cmd; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); ta.remove();
        btn.textContent = "Copied — paste in your terminal";
      });
      setTimeout(function () { btn.textContent = "Copy command"; }, 2500);
    });
    document.addEventListener("keydown", rrShortcuts);
    rrRefresh();
  }

  function rrMode(merge) {
    document.getElementById("rrModeMerge").classList.toggle("sel", merge);
    document.getElementById("rrModeNew").classList.toggle("sel", !merge);
    rrRefresh();
  }

  function closeRerun() {
    const o = document.getElementById("rrOverlay");
    if (o) o.remove();
    document.removeEventListener("keydown", rrShortcuts);
  }

  function wireRerun() {
    const btn = document.getElementById("btnRerun");
    if (btn) btn.addEventListener("click", openRerun);
  }
})();
</script>
</body>
</html>
