<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chasm Jump Physics Simulation</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d081b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #111424 0%, #301934 100%);
        }
        /* Discrete status overlay for a premium simulation look */
        #sim-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.85);
            pointer-events: none;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            font-size: 14px;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        .hud-label {
            color: #ff9d00;
            font-weight: bold;
        }
        .red-text { color: #ff5252; font-weight: bold; }
        .blue-text { color: #40c4ff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="sim-overlay">
        <div style="font-size: 18px; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;">CANYON JUMP SIMULATOR</div>
        <div>SIMULATION STATE: <span id="state-text" style="color: #4caf50; font-weight: bold;">ACCELERATING</span></div>
        <div>RED CAR SPEED: <span id="red-speed" class="red-text">0 km/h</span></div>
        <div>BLUE CAR SPEED: <span id="blue-speed" class="blue-text">0 km/h</span></div>
        <div style="margin-top: 5px; font-size: 11px; color: rgba(255,255,255,0.5);">GEN: <span id="sim-gen">1</span> | AUTO-LOOP ACTIVE</div>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        // Setup Canvas
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // Stats elements
        const stateTextDisp = document.getElementById('state-text');
        const redSpeedDisp = document.getElementById('red-speed');
        const blueSpeedDisp = document.getElementById('blue-speed');
        const simGenDisp = document.getElementById('sim-gen');

        // Screen Dimensions & Coordinate Mapping
        // We will design in a virtual space of 1200 x 800 and scale dynamically to preserve layout ratios (especially in squares)
        const vWidth = 1200;
        const vHeight = 800;
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;

        function resize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;

            // Fit virtual coordinate 1200x800 aspect ratio inside actual viewport
            const scaleX = w / vWidth;
            const scaleY = h / vHeight;
            scale = Math.min(scaleX, scaleY);

            offsetX = (w - vWidth * scale) / 2;
            offsetY = (h - vHeight * scale) / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Environment Layout Specs (Virtual coords)
        const canyonLeft = 450;
        const canyonRight = 750;
        const groundY = 560;
        const canyonDepth = 800;

        // Custom ramp shapes
        const leftRampBaseX = 350;
        const rightLandBaseX = 850;

        // Physics constants (tuned to scale)
        const GRAVITY = 0.32;
        const FRICTION_GROUND = 0.99;
        const AIR_RESISTANCE = 0.995;

        // Particle System
        const particles = [];
        function createSmoke(x, y, color, size, count=1) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.7) * 2,
                    vy: (Math.random() - 0.4) * 1.5 - 1.0,
                    size: size * (0.4 + Math.random() * 0.6),
                    alpha: 0.8,
                    decay: 0.015 + Math.random() * 0.02,
                    color: color,
                    type: 'smoke'
                });
            }
        }

        function createSpark(x, y, count=5) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.8) * 8 - 2,
                    size: 2 + Math.random() * 3,
                    alpha: 1.0,
                    decay: 0.02 + Math.random() * 0.03,
                    color: '#ffc107',
                    type: 'spark'
                });
            }
        }

        function updateParticles() {
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                if(p.type === 'smoke') {
                    p.size += 0.25;
                } else if(p.type === 'spark') {
                    p.vy += 0.15; // spark gravity
                }
                if(p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // Drifting Clouds & Sky Sun
        const clouds = [
            { x: 100, y: 150, size: 50, speed: 0.2 },
            { x: 450, y: 100, size: 70, speed: 0.15 },
            { x: 800, y: 180, size: 40, speed: 0.25 },
            { x: 1100, y: 120, size: 60, speed: 0.12 }
        ];

        // Generation Counter
        let generation = 1;

        // Custom Vehicle Class representing a simulated car with custom suspension
        class Car {
            constructor(color, colorHex, initialYOffset) {
                this.colorName = color;
                this.colorHex = colorHex;
                this.ySubOffset = initialYOffset; // unique lane displacement to prevent exact overlay
                this.reset();
            }

            reset() {
                // Generate randomized initial performance traits so results differ each loop
                this.targetSpeed = 12.5 + Math.random() * 5.0; // target engine output speed
                this.maxAccel = 0.09 + Math.random() * 0.06;
                
                this.x = -150 - Math.random() * 80;
                this.y = groundY + this.ySubOffset;
                
                this.vx = 0;
                this.vy = 0;
                this.angle = 0;
                this.angularVelocity = 0;
                
                // Suspension properties (chassis relative offset)
                this.frontSpring = 0; 
                this.rearSpring = 0;
                this.frontSpringV = 0;
                this.rearSpringV = 0;
                
                this.wheelsSpin = 0;
                
                // Simulation tracking state
                this.state = 'ACCELERATING'; // ACCELERATING, FLYING, CRASHED, LANDED, OUT_RANGE
                this.grounded = true;
                this.landingPuffsGenerated = false;
                this.hasScoredLand = false;
                this.hasScoredCrash = false;
            }

            // Custom terrain evaluation function for the Left Ramp, Gap, and Right Landing Platform
            getTerrainHeightAndSlope(x) {
                // Left Approach
                if (x < leftRampBaseX) {
                    return { y: groundY + this.ySubOffset, slope: 0, solid: true };
                } 
                // Left Launch Ramp (curve upwards to launch)
                else if (x >= leftRampBaseX && x <= canyonLeft) {
                    const norm = (x - leftRampBaseX) / (canyonLeft - leftRampBaseX);
                    // parabolic ramp slope
                    const heightRise = 42; 
                    const curY = groundY + this.ySubOffset - (norm * norm) * heightRise;
                    const slopeAngle = Math.atan2(-2 * norm * heightRise / (canyonLeft - leftRampBaseX), 1);
                    return { y: curY, slope: slopeAngle, solid: true };
                } 
                // Giant Canyon Chasm
                else if (x > canyonLeft && x < canyonRight) {
                    return { y: 9999, slope: 0, solid: false };
                } 
                // Right Landing Zone (soft downward decline leveling off)
                else {
                    const slopeEnd = rightLandBaseX;
                    if (x < slopeEnd) {
                        const norm = (x - canyonRight) / (slopeEnd - canyonRight);
                        // landing wedge slopes down slightly or is level
                        const heightDrop = 15;
                        const curY = groundY + this.ySubOffset + (1 - norm) * heightDrop;
                        const slopeAngle = Math.atan2(-heightDrop / (slopeEnd - canyonRight), 1);
                        return { y: curY, slope: slopeAngle, solid: true };
                    } else {
                        return { y: groundY + this.ySubOffset, slope: 0, solid: true };
                    }
                }
            }

            update() {
                // Wheel spinning animation based on horizontal progress
                this.wheelsSpin += this.vx * 0.15;

                // 1. Suspension Dynamics simulation (Spring mass-damper)
                const springK = 0.18; // stiffness
                const springDamp = 0.82; // absorption factor
                
                // Simulating simulated forces driving spring compression
                // Front and rear rebound forces
                this.frontSpring += this.frontSpringV;
                this.rearSpring += this.rearSpringV;
                this.frontSpringV = (this.frontSpringV - this.frontSpring * springK) * springDamp;
                this.rearSpringV = (this.rearSpringV - this.rearSpring * springK) * springDamp;

                // 2. State-Based Action Loops
                const terrain = this.getTerrainHeightAndSlope(this.x);

                if (this.state === 'ACCELERATING') {
                    // Smoothly accelerate up to target speed limit
                    if (this.vx < this.targetSpeed) {
                        this.vx += this.maxAccel;
                    }

                    // Align to soil height and track ramp curve
                    this.y = terrain.y;
                    this.angle = terrain.slope;

                    // Wheel smoke trails on run-up
                    if (Math.random() < 0.35) {
                        createSmoke(this.x - 20, this.y + 4, '#5d4037', 5, 1);
                    }

                    // Check if car flew off launch threshold
                    if (this.x >= canyonLeft) {
                        this.state = 'FLYING';
                        this.grounded = false;
                        // Boost vertical launch angle speed relative to slope
                        this.vy = Math.sin(this.angle) * this.vx;
                        this.vx = Math.cos(this.angle) * this.vx;
                    }
                } 
                else if (this.state === 'FLYING') {
                    // Flying through the air with passive gravitational pull and drag
                    this.vx *= AIR_RESISTANCE;
                    this.vy += GRAVITY;
                    
                    this.x += this.vx;
                    this.y += this.vy;

                    // Gravity causes aerodynamic nose pointing in flight
                    const targetFlyAngle = Math.atan2(this.vy, this.vx);
                    this.angle += (targetFlyAngle - this.angle) * 0.08;

                    // Check boundaries & possible landing contacts
                    if (this.y > 900) {
                        this.state = 'CRASHED';
                    } else if (this.x >= canyonRight) {
                        const surface = this.getTerrainHeightAndSlope(this.x);
                        if (this.y >= surface.y - 12) { // landing contact threshold
                            this.landingImpact(surface);
                        }
                    } else {
                        // Cliff wall collision checks
                        if (this.y > groundY && this.x < canyonRight - 10) {
                            // Hit outer right cliff face!
                            this.state = 'CRASHED';
                            createSpark(this.x, this.y, 25);
                            this.vx = -this.vx * 0.25;
                            this.vy = 4;
                        }
                    }
                } 
                else if (this.state === 'LANDED') {
                    // Rolling safely on the landing terrain structure
                    const surface = this.getTerrainHeightAndSlope(this.x);
                    this.vy = 0;
                    this.y = surface.y;
                    this.angle = surface.slope;
                    this.vx *= FRICTION_GROUND;

                    // Gradually come to natural drift stop
                    if (this.vx < 0.2) this.vx = 0;
                    this.x += this.vx;

                    // Kick up occasional puffs of landing dust
                    if (this.vx > 1 && Math.random() < 0.2) {
                        createSmoke(this.x - 20, this.y + 4, '#9e9e9e', 6, 1);
                    }
                } 
                else if (this.state === 'CRASHED') {
                    // Downward descent collapse logic
                    this.vy += GRAVITY * 1.5;
                    this.vx *= 0.98;
                    this.angle += 0.07;
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    if (Math.random() < 0.3) {
                        createSmoke(this.x, this.y, '#ff5722', 8, 2);
                    }
                }

                // Final safety trigger to recycle far right runs
                if (this.x > vWidth + 250) {
                    this.state = 'OUT_RANGE';
                }
            }

            landingImpact(surface) {
                this.state = 'LANDED';
                this.grounded = true;
                this.y = surface.y;
                this.angle = surface.slope;

                // Strong downward landing impact squeezes springs tight (negative offsets)
                const force = Math.min(25, this.vy * 4);
                this.frontSpring = -force;
                this.rearSpring = -force * 0.8;
                
                // Spawn high-energy dirt/dust clouds upon landing
                if (!this.landingPuffsGenerated) {
                    createSmoke(this.x - 15, this.y + 2, '#d7ccc8', 12, 10);
                    createSmoke(this.x + 15, this.y + 2, '#d7ccc8', 9, 8);
                    createSpark(this.x, this.y + 5, 8);
                    this.landingPuffsGenerated = true;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Apply suspension offsets to chassis (interpolated spring heights)
                let avgSuspension = (this.frontSpring + this.rearSpring) * 0.5;
                let pitchSuspension = (this.frontSpring - this.rearSpring) * 0.2;

                // Draw Shadows on floor
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.45)';
                ctx.scale(1.1, 0.45);
                ctx.beginPath();
                ctx.arc(0, 10 - avgSuspension, 32, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Group Chassis and apply spring motions
                ctx.save();
                ctx.translate(0, avgSuspension);
                ctx.rotate(pitchSuspension);

                // --- CAR VISUAL BODY ---
                // Slick aerodynamic sports chassis
                ctx.fillStyle = this.colorHex;
                ctx.beginPath();
                ctx.moveTo(-45, -2);
                ctx.lineTo(-43, -16);
                ctx.lineTo(-20, -18);
                ctx.lineTo(-6, -34);
                ctx.lineTo(24, -34);
                ctx.lineTo(44, -14);
                ctx.lineTo(48, -2);
                ctx.closePath();
                ctx.fill();

                // Dark Metallic trim highlights
                ctx.fillStyle = '#212121';
                ctx.beginPath();
                ctx.moveTo(-45, -2);
                ctx.lineTo(-43, -7);
                ctx.lineTo(47, -7);
                ctx.lineTo(48, -2);
                ctx.closePath();
                ctx.fill();

                // Aerodynamic Spoiler Wing
                ctx.fillStyle = '#111';
                ctx.fillRect(-45, -25, 4, 10);
                ctx.fillRect(-49, -29, 11, 4);

                // Futuristic glass canopy
                ctx.fillStyle = '#80deea';
                ctx.beginPath();
                ctx.moveTo(-3, -31);
                ctx.lineTo(19, -31);
                ctx.lineTo(34, -16);
                ctx.lineTo(-3, -16);
                ctx.closePath();
                ctx.fill();
                
                // Windshield gleam highlight
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(12, -31);
                ctx.lineTo(19, -31);
                ctx.lineTo(32, -18);
                ctx.lineTo(25, -18);
                ctx.closePath();
                ctx.fill();

                // Cabin driver silhouette
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.beginPath();
                ctx.arc(6, -21, 6, 0, Math.PI * 2);
                ctx.fill();

                // Glow Headlight (yellow) & Tail light (red)
                ctx.fillStyle = '#ffeb3b';
                ctx.beginPath();
                ctx.arc(46, -10, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ff1744';
                ctx.fillRect(-45, -13, 2, 5);

                ctx.restore(); // end chassis translation

                // --- WHEELS AND AXLES (drawn at ground level relative to body suspension) ---
                const wheelRad = 11;
                const frontWheelX = 26;
                const rearWheelX = -26;
                const wheelY = 2;

                // Draw Wheel function
                const drawWheel = (wx, wy, spinAngle) => {
                    ctx.save();
                    ctx.translate(wx, wy);
                    ctx.rotate(spinAngle);
                    
                    // Outer rubber tread
                    ctx.fillStyle = '#1a1a24';
                    ctx.beginPath();
                    ctx.arc(0, 0, wheelRad, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Interior metallic rim
                    ctx.fillStyle = '#cfd8dc';
                    ctx.beginPath();
                    ctx.arc(0, 0, wheelRad - 4, 0, Math.PI * 2);
                    ctx.fill();

                    // Rim spoke details rotating dynamically
                    ctx.fillStyle = '#37474f';
                    ctx.fillRect(-wheelRad + 3, -1.5, (wheelRad - 3) * 2, 3);
                    ctx.fillRect(-1.5, -wheelRad + 3, 3, (wheelRad - 3) * 2);

                    // Tiny central cap hub
                    ctx.fillStyle = '#cfd8dc';
                    ctx.beginPath();
                    ctx.arc(0, 0, 2, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                };

                // Left Wheel & Right Wheel drawn with suspension offset applied
                drawWheel(rearWheelX, wheelY + this.rearSpring * 0.4, this.wheelsSpin);
                drawWheel(frontWheelX, wheelY + this.frontSpring * 0.4, this.wheelsSpin);

                ctx.restore();
            }
        }

        // Instantiating the red and blue racer dynamics setup
        const redCar = new Car('RED_CAR', '#d32f2f', -6);
        const blueCar = new Car('BLUE_CAR', '#0288d1', 6);

        // Interactive background design parameters
        const terrainPalette = {
            cliffTop: '#2d1839',      // Dark rock top profile
            cliffFace: '#1a0c24',     // Heavy shadow underground
            cliffHighlight: '#6a3b80',// Electric top rim highlights
            sunColor: '#ff2a6d'       // Hot synthwave red-pink sun
        };

        // Render Background Sun, drifting clouds, and parallax mountains
        function drawBackground() {
            // Draw Parallax Sun
            ctx.fillStyle = terrainPalette.sunColor;
            ctx.beginPath();
            ctx.arc(600, 220, 110, 0, Math.PI * 2);
            ctx.fill();

            // Solar flare bands (cyberpunk style sliced horizontal cuts)
            ctx.fillStyle = '#111424';
            for (let y = 140; y < 330; y += 18) {
                const thickness = (y - 120) / 45;
                ctx.fillRect(450, y, 300, Math.max(1, thickness));
            }

            // Draw clouds with parallax drift speed scaling
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            clouds.forEach(cloud => {
                cloud.x += cloud.speed;
                if (cloud.x > vWidth + 120) cloud.x = -120;

                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                ctx.arc(cloud.x + Math.floor(cloud.size * 0.6), cloud.y - Math.floor(cloud.size * 0.2), Math.floor(cloud.size * 0.8), 0, Math.PI * 2);
                ctx.arc(cloud.x - Math.floor(cloud.size * 0.6), cloud.y, Math.floor(cloud.size * 0.7), 0, Math.PI * 2);
                ctx.fill();
            });

            // Distant purple mountains (Midground parallax)
            ctx.fillStyle = '#1e112b';
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(150, 310);
            ctx.lineTo(280, 480);
            ctx.lineTo(440, 290);
            ctx.lineTo(600, 500);
            ctx.lineTo(760, 310);
            ctx.lineTo(920, 480);
            ctx.lineTo(1050, 280);
            ctx.lineTo(vWidth, groundY);
            ctx.closePath();
            ctx.fill();
        }

        // Draw ground scenery, cliff platforms, and bottom bottomless canyon pit
        function drawScenePlatforms() {
            // Left Hill Base Ground 
            ctx.fillStyle = terrainPalette.cliffFace;
            ctx.beginPath();
            ctx.moveTo(0, vHeight);
            ctx.lineTo(0, groundY);
            ctx.lineTo(leftRampBaseX, groundY);
            // Curves up to launch edge
            for (let px = leftRampBaseX; px <= canyonLeft; px += 2) {
                const norm = (px - leftRampBaseX) / (canyonLeft - leftRampBaseX);
                const py = groundY - (norm * norm) * 42;
                ctx.lineTo(px, py);
            }
            ctx.lineTo(canyonLeft, vHeight);
            ctx.closePath();
            ctx.fill();

            // Right Landing Hill Base Ground
            ctx.beginPath();
            ctx.moveTo(canyonRight, vHeight);
            // Wedge landing incline
            for (let px = canyonRight; px <= rightLandBaseX; px += 2) {
                const norm = (px - canyonRight) / (rightLandBaseX - canyonRight);
                const py = groundY + (1 - norm) * 15;
                ctx.lineTo(px, py);
            }
            ctx.lineTo(vWidth, groundY);
            ctx.lineTo(vWidth, vHeight);
            ctx.closePath();
            ctx.fill();

            // Cliff top trim/deck detailing (high contrast grass/safety yellow outline)
            ctx.strokeStyle = terrainPalette.cliffHighlight;
            ctx.lineWidth = 6;
            ctx.beginPath();
            // Left profile
            ctx.moveTo(0, groundY);
            ctx.lineTo(leftRampBaseX, groundY);
            for (let px = leftRampBaseX; px <= canyonLeft; px++) {
                const norm = (px - leftRampBaseX) / (canyonLeft - leftRampBaseX);
                const py = groundY - (norm * norm) * 42;
                ctx.lineTo(px, py);
            }
            ctx.stroke();

            // Right profile
            ctx.beginPath();
            for (let px = canyonRight; px <= rightLandBaseX; px++) {
                const norm = (px - canyonRight) / (rightLandBaseX - canyonRight);
                const py = groundY + (1 - norm) * 15;
                ctx.lineTo(px, py);
            }
            ctx.lineTo(vWidth, groundY);
            ctx.stroke();

            // Safety Warning Stripes at Edge cliff launch
            ctx.save();
            ctx.strokeStyle = '#ff9800';
            ctx.lineWidth = 3;
            for(let sx = canyonLeft - 30; sx < canyonLeft; sx += 8){
                ctx.beginPath();
                ctx.moveTo(sx, groundY - 12);
                ctx.lineTo(sx + 5, groundY - 2);
                ctx.stroke();
            }
            ctx.restore();

            // Canyon Vertical Face Shadows & Depth detail patterns
            ctx.fillStyle = '#0a050f';
            // Left Wall
            ctx.fillRect(canyonLeft - 35, groundY - 15, 35, vHeight - groundY);
            // Right Wall
            ctx.fillRect(canyonRight, groundY, 40, vHeight - groundY);

            // Tech hazard background structures inside pit
            ctx.fillStyle = 'rgba(255, 42, 109, 0.05)';
            ctx.fillRect(canyonLeft, 680, canyonRight - canyonLeft, 5);
            ctx.fillRect(canyonLeft, 715, canyonRight - canyonLeft, 3);
        }

        // Draw dust and spark particles
        function drawParticles() {
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0; // restore default
        }

        // Update the top HTML control panels
        function updateHudDisplay() {
            // Status determinations
            let displayState = "ACCELERATING";
            if (redCar.state === "FLYING" || blueCar.state === "FLYING") {
                displayState = "AIRBORNE";
            } else if (redCar.state === "LANDED" || blueCar.state === "LANDED") {
                displayState = "TOUCHDOWN SPEED REGULATION";
            } else if (redCar.state === "CRASHED" && blueCar.state === "CRASHED") {
                displayState = "CANYON WRECK / FAILED";
            }

            stateTextDisp.innerText = displayState;
            simGenDisp.innerText = generation;

            // Convert velocity value unit representations simulating km/h
            const redSpeedKmh = Math.floor(redCar.vx * 19.5);
            const blueSpeedKmh = Math.floor(blueCar.vx * 19.5);

            redSpeedDisp.innerText = redCar.state === 'CRASHED' ? 'WRECKED' : `${redSpeedKmh} km/h`;
            blueSpeedDisp.innerText = blueCar.state === 'CRASHED' ? 'WRECKED' : `${blueSpeedKmh} km/h`;
        }

        // Global Loop System check
        function globalSimulationLoop() {
            // Update individual cars
            redCar.update();
            blueCar.update();
            updateParticles();

            // Check if both simulation passes are out of sight, resetting infinite trials
            const redFinished = (redCar.state === 'OUT_RANGE' || redCar.y > vHeight + 200);
            const blueFinished = (blueCar.state === 'OUT_RANGE' || blueCar.y > vHeight + 200);

            if (redFinished && blueFinished) {
                // Loop trigger: Reset positions & parameters
                generation++;
                redCar.reset();
                blueCar.reset();
            }

            // Render Entire scene view
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // Apply scale transform respecting screen shape and coordinates
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            // Step 1: Sky gradient & background details
            drawBackground();

            // Step 2: Canyon & Land structures
            drawScenePlatforms();

            // Step 3: Draw Particles (underneath cars for layered depth)
            drawParticles();

            // Step 4: Draw Sports Cars
            redCar.draw();
            blueCar.draw();

            ctx.restore();

            // Step 5: Screen text HUD updates
            updateHudDisplay();

            requestAnimationFrame(globalSimulationLoop);
        }

        // Initialize Loop directly
        globalSimulationLoop();
    </script>
</body>
