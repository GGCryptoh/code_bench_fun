<!doctype html>
<html><head><meta charset="utf-8"><style>html,body{margin:0;height:100%;overflow:hidden;background:#141018}canvas{display:block;width:100%;height:100%}</style></head>
<body><canvas id="c"></canvas><script>
const c=document.getElementById('c'),x=c.getContext('2d');let W,H;
function rs(){W=c.width=innerWidth*devicePixelRatio;H=c.height=innerHeight*devicePixelRatio}rs();onresize=rs;
let a=0;function t(){a+=.01;x.fillStyle='rgba(20,16,24,.25)';x.fillRect(0,0,W,H);
for(let i=0;i<14;i++){const p=a+i*.45,r=(.1+.32*Math.abs(Math.sin(p*.7)))*Math.min(W,H);
x.strokeStyle=`hsla(${(i*26+a*40)%360},70%,60%,.8)`;x.lineWidth=3;x.beginPath();
x.arc(W/2+Math.cos(p)*W*.18,H/2+Math.sin(p*1.3)*H*.18,r*.35,0,7);x.stroke()}
requestAnimationFrame(t)}t();
</script></body></html>
