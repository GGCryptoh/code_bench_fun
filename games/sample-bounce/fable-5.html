<!doctype html>
<html><head><meta charset="utf-8"><style>html,body{margin:0;height:100%;overflow:hidden;background:#0e1420}canvas{display:block;width:100%;height:100%}</style></head>
<body><canvas id="c"></canvas><script>
const c=document.getElementById('c'),x=c.getContext('2d');let W,H;
function rs(){W=c.width=innerWidth*devicePixelRatio;H=c.height=innerHeight*devicePixelRatio}rs();onresize=rs;
const N=26,B=[];for(let i=0;i<N;i++)B.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.004,vy:0,r:.012+Math.random()*.03,h:200+Math.random()*140});
function t(){x.fillStyle='#0e1420';x.fillRect(0,0,W,H);
for(const b of B){b.vy+=.0006;b.x+=b.vx;b.y+=b.vy;
if(b.y>1-b.r){b.y=1-b.r;b.vy*=-.92}if(b.x<b.r||b.x>1-b.r){b.vx*=-1;b.x=Math.max(b.r,Math.min(1-b.r,b.x))}
const g=x.createRadialGradient(b.x*W-b.r*W*.3,b.y*H-b.r*W*.3,1,b.x*W,b.y*H,b.r*W);
g.addColorStop(0,`hsl(${b.h},80%,72%)`);g.addColorStop(1,`hsl(${b.h},70%,45%)`);
x.fillStyle=g;x.beginPath();x.arc(b.x*W,b.y*H,b.r*W,0,7);x.fill()}
requestAnimationFrame(t)}t();
</script></body></html>
